<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    smart-icons brand mark: an HA-style rounded-square favicon being
    painted by a brush leaving a rainbow streak. The favicon glyph is
    deliberately a stylized homage (peaked-roof house + three dots, HA
    blue) rather than a direct lift of the official mark — close enough
    to be recognizable, distinct enough to avoid brand-trademark issues.

    Layer order (back → front):
      1. Drop shadow under the favicon
      2. Favicon background (rounded square, HA blue)
      3. House-and-dots glyph (white)
      4. Rainbow paint streak crossing the favicon (clipped to its edges)
      5. Paintbrush angled from upper-right, tip touching the streak
  -->

  <defs>
    <!-- Used to clip the rainbow stroke so it only appears INSIDE the
         house glyph — we're coloring the icon, not painting over the
         favicon background. Path is identical to the white house
         pentagon drawn below. -->
    <clipPath id="house-clip">
      <path d="M 128 78 L 180 116 L 180 178 L 76 178 L 76 116 Z"/>
    </clipPath>

    <!-- Brush bristles: a tapered tip the brush handle plugs into. -->
    <linearGradient id="bristles" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a2a18"/>
      <stop offset="60%"  stop-color="#5a3d22"/>
      <stop offset="100%" stop-color="#1c1208"/>
    </linearGradient>

    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9a6a3a"/>
      <stop offset="50%"  stop-color="#c08850"/>
      <stop offset="100%" stop-color="#7a4f24"/>
    </linearGradient>
  </defs>

  <!-- 1. Ground shadow -->
  <ellipse cx="128" cy="226" rx="78" ry="7" fill="#000" opacity="0.18"/>

  <!-- 2. Favicon background — rounded square in HA blue -->
  <rect x="44" y="44" width="168" height="168" rx="34" ry="34"
        fill="#1976d2"/>

  <!-- A subtle inner highlight along the top edge so the favicon
       doesn't look completely flat -->
  <rect x="44" y="44" width="168" height="40" rx="34" ry="34"
        fill="#ffffff" opacity="0.08"/>

  <!-- 3. House-and-dots glyph (stylized homage to HA's mark).
       Pentagon shape: square base with a peaked roof. Three small
       dots arranged inside. -->
  <path d="M 128 78
           L 180 116
           L 180 178
           L 76  178
           L 76  116
           Z"
        fill="#ffffff"/>
  <circle cx="128" cy="120" r="7"  fill="#1976d2"/>
  <circle cx="108" cy="150" r="7"  fill="#1976d2"/>
  <circle cx="148" cy="150" r="7"  fill="#1976d2"/>

  <!-- 4. Rainbow wedge — six stacked trapezoids that together fill
       the lower portion of the house. Bottom edge is horizontal,
       flush with the house floor everywhere (no white below). Top
       edge of the whole stack tilts at 15° going up-right, so the
       band is thicker at the right than the left. Each color is
       its own trapezoid; they tile exactly with no gaps. Clipped
       to the house outline at the rim. -->
  <g clip-path="url(#house-clip)">
    <polygon points="40,178 220,178 220,165 40,173" fill="#e63946"/>
    <polygon points="40,173 220,165 220,152 40,168" fill="#f77f00"/>
    <polygon points="40,168 220,152 220,139 40,163" fill="#ffd60a"/>
    <polygon points="40,163 220,139 220,126 40,158" fill="#2a9d8f"/>
    <polygon points="40,158 220,126 220,112 40,153" fill="#03a9f4"/>
    <polygon points="40,153 220,112 220,99  40,148" fill="#7b2cbf"/>
  </g>

  <!-- 5. Paintbrush, tip touching the house at the upper-right end
       of the wedge (where it's thickest), handle trailing up-and-
       right out of the favicon. Rotation is negative so local +x
       points up-right, matching the wedge's top-edge tilt. -->
  <g transform="translate(210 113) rotate(-15)">
    <!-- Ferrule (silver band where bristles meet handle) -->
    <rect x="0" y="-9" width="14" height="18" fill="#bcbcc4" stroke="#6f6f78" stroke-width="1"/>
    <!-- Bristles — tapered toward the canvas, dark to suggest paint -->
    <path d="M 0 -9 L -22 -6 L -28 0 L -22 6 L 0 9 Z"
          fill="url(#bristles)"
          stroke="#1a0e04" stroke-width="1"/>
    <!-- Small dab of color at the brush tip, matching the red end
         of the streak where the brush just lifted off. -->
    <circle cx="-22" cy="0" r="4" fill="#e63946"/>
    <!-- Wooden handle — shorter so it doesn't sail far past
         the canvas edge. -->
    <rect x="14" y="-7" width="60" height="14" rx="3" ry="3"
          fill="url(#handle)"
          stroke="#3a2410" stroke-width="1.2"/>
    <!-- Handle end cap -->
    <ellipse cx="74" cy="0" rx="3" ry="7" fill="#3a2410"/>
  </g>
</svg>
