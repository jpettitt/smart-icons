name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Both jobs are cheap (< 1 minute each on a clean runner) and fully
# independent — backend doesn't share build state with the frontend
# bundle. Run them in parallel.
#
# Action references are pinned to a commit SHA (with the matching
# release tag in a trailing comment) per GitHub's security guidance —
# tags can be re-pointed, SHAs cannot. Bump deliberately on review of
# the upstream changelog; do not let Dependabot auto-upgrade without
# inspection.

jobs:
  backend:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements_test.txt

      - run: pip install --upgrade pip
      - run: pip install -r requirements_test.txt
      - run: pip install home-assistant-frontend
      - run: pytest -q

  frontend:
    name: typecheck + tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - working-directory: frontend
        run: npm ci

      - working-directory: frontend
        run: npm run typecheck

      - working-directory: frontend
        run: npm test

      - working-directory: frontend
        run: npm run build

      # Catch the "forgot to rebuild" foot-gun: if a source change
      # affects the bundle but the committed bundle wasn't updated,
      # the diff between the fresh build and the committed file is
      # non-empty and we fail the build.
      - name: Verify committed bundles match a fresh build
        run: |
          if ! git diff --quiet -- custom_components/smart_icons/static/; then
            echo "::error::Committed bundles differ from a fresh build."
            echo "Run 'cd frontend && npm run build' and commit the result."
            git diff --stat -- custom_components/smart_icons/static/
            exit 1
          fi
